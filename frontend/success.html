<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Order Successful | AK Art</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

    <!-- HEADER -->

    <header class="header">

        <div class="logo-container">
            <img src="Personal work/logo.gif" alt="AK Art Logo" class="logo">
        </div>

        <nav class="navbar">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="explore.html">Explore</a></li>
                <li><a href="shop.html">Digital Prints</a></li>
            </ul>
        </nav>

    </header>


    <!-- SUCCESS SECTION -->

    <section class="success-section">

        <div class="success-container">

            <div class="success-icon">✔</div>

            <h1>Payment Successful</h1>

            <p class="success-message">
                Thank you for purchasing from AK Art. Your digital artwork is ready to download.
            </p>


            <div class="order-details">

                <img id="artPreview" alt="Purchased Artwork">

                <h3 id="artName"></h3>

                <p id="artPrice"></p>

            </div>


            <div class="success-buttons">

                <button class="download-btn" onclick="downloadArt()">
                    Download Artwork
                </button>

                <a href="shop.html">
                    <button class="shop-btn">
                        Continue Shopping
                    </button>
                </a>

            </div>

        </div>

    </section>


    <!-- FOOTER -->

    <footer class="footer">

        <p>© 2026 Abhilasha Khatri Studio</p>

    </footer>
    <script src="script.js"></script>
</body>

</html>

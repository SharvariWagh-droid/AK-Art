<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimonials — Admin Panel</title>
  <link rel="stylesheet" href="admin.css">
</head>

<body onload="checkAuth(); renderTestimonials();">

  <div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">A</div>
        <div>
          <h2>Abhilasha</h2>
          <small>Admin Panel</small>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="manage-art.html"><span class="nav-icon">🎨</span> Personal Art</a>
        <a href="published-works.html"><span class="nav-icon">📚</span> Published Works</a>
        <a href="digital-prints.html"><span class="nav-icon">🖼️</span> Digital Prints</a>
        <a href="orders.html"><span class="nav-icon">📦</span> Orders</a>
        <a href="testimonials.html" class="active"><span class="nav-icon">💬</span> Testimonials</a>
      </nav>

      <div class="sidebar-footer">
        <a href="#" onclick="logout()">🚪 Sign Out</a>
      </div>

    </aside>


    <!-- MAIN CONTENT -->
    <div class="main-content">

      <header class="top-header">

        <div style="display:flex;align-items:center;gap:12px;">
          <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
          <h1>Testimonials</h1>
        </div>

        <div class="header-right">

          <div class="admin-profile">
            <div class="admin-avatar">A</div>
            <span class="admin-name">Abhilasha</span>
          </div>

        </div>

      </header>


      <div class="content-area">

        <div class="section-header">
          <h2>Manage Testimonials</h2>

          <button class="btn btn-primary" onclick="openModal('add-test-modal')">
            + Add Testimonial
          </button>

        </div>

        <div class="cards-grid" id="testimonials-grid"></div>

      </div>

    </div>

  </div>


  <!-- ADD TESTIMONIAL MODAL -->

  <div class="modal-overlay" id="add-test-modal">

    <div class="modal">

      <h2>Add Testimonial</h2>

      <form id="testimonial-form" onsubmit="addTestimonial(event)">

        <div class="form-group">
          <label for="test-name">Name</label>
          <input type="text" id="test-name" placeholder="Person's name" required>
        </div>

        <div class="form-group">
          <label for="test-message">Message</label>
          <textarea id="test-message" rows="4" placeholder="Testimonial message..." required></textarea>
        </div>

        <div class="modal-actions">

          <button type="button" class="btn btn-danger" onclick="closeModal('add-test-modal')">
            Cancel
          </button>

          <button type="submit" class="btn btn-primary">
            Add Testimonial
          </button>

        </div>

      </form>

    </div>

  </div>


  <script src="admin.js"></script>

</body>

</html>
